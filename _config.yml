title: Jakob-Blog
description: "Hit an exception when I try to describe myself."
author:
  name: "Jakob"
  email: "lewei.me@gmail.com"
  url: "https://leweii.github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "Jakob"
year : "2020"
