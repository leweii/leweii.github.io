<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 605" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1L9 5L0 9z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect width="960" height="605" fill="white"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">我的知识管理框架</text>
  <text x="480" y="52" text-anchor="middle" font-size="10" fill="#94a3b8" letter-spacing="0.5">Personal Knowledge Management Framework</text>

  <!-- ===== 应用层 ===== -->
  <text x="55" y="78" font-size="10" font-weight="600" fill="#f43f5e" letter-spacing="1.5">应用层</text>
  <line x1="88" y1="74" x2="905" y2="74" stroke="#e2e8f0"/>

  <rect x="55" y="90" width="260" height="40" rx="8" fill="#9f1239"/>
  <text x="185" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="white">定制化单词推送</text>

  <rect x="340" y="90" width="260" height="40" rx="8" fill="#9f1239"/>
  <text x="470" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="white">知识卡片分发</text>

  <rect x="625" y="90" width="280" height="40" rx="8" fill="#9f1239"/>
  <text x="765" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="white">复盘 / 报表 / 流程优化</text>

  <!-- Arrow up -->
  <line x1="480" y1="152" x2="480" y2="136" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ===== 云端 Agent 层 ===== -->
  <text x="55" y="168" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="1.5">云端 Agent 层</text>
  <line x1="118" y1="164" x2="905" y2="164" stroke="#e2e8f0"/>

  <!-- Hermes Agent -->
  <rect x="55" y="211" width="370" height="50" rx="8" fill="#5b21b6"/>
  <text x="240" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="white">Hermes Agent</text>

  <!-- Table: 按组织层级抽象 -->
  <text x="470" y="180" font-size="10" font-weight="600" fill="#7c3aed">按组织层级抽象</text>

  <rect x="470" y="186" width="435" height="107" rx="5" fill="white" stroke="#ddd6fe"/>
  <rect x="471" y="187" width="433" height="21" rx="4" fill="#f5f3ff"/>
  <line x1="470" y1="208" x2="905" y2="208" stroke="#ddd6fe"/>
  <line x1="535" y1="187" x2="535" y2="293" stroke="#ede9fe"/>
  <line x1="755" y1="187" x2="755" y2="293" stroke="#ede9fe"/>
  <line x1="470" y1="225" x2="905" y2="225" stroke="#f5f3ff"/>
  <line x1="470" y1="242" x2="905" y2="242" stroke="#f5f3ff"/>
  <line x1="470" y1="259" x2="905" y2="259" stroke="#f5f3ff"/>
  <line x1="470" y1="276" x2="905" y2="276" stroke="#f5f3ff"/>

  <text x="502" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">层级</text>
  <text x="645" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">知识内容</text>
  <text x="830" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">可见范围</text>

  <text x="502" y="220" text-anchor="middle" font-size="10" font-weight="500" fill="#334155">企业</text>
  <text x="645" y="220" text-anchor="middle" font-size="10" fill="#475569">战略方向 · 核心原则</text>
  <text x="830" y="220" text-anchor="middle" font-size="9" fill="#94a3b8">跨团队共享</text>

  <text x="502" y="237" text-anchor="middle" font-size="10" font-weight="500" fill="#334155">项目</text>
  <text x="645" y="237" text-anchor="middle" font-size="10" fill="#475569">决策记录 · 里程碑</text>
  <text x="830" y="237" text-anchor="middle" font-size="9" fill="#94a3b8">项目成员可见</text>

  <text x="502" y="254" text-anchor="middle" font-size="10" font-weight="500" fill="#334155">团队</text>
  <text x="645" y="254" text-anchor="middle" font-size="10" fill="#475569">流程沉淀 · 团队经验</text>
  <text x="830" y="254" text-anchor="middle" font-size="9" fill="#94a3b8">团队内共享</text>

  <text x="502" y="271" text-anchor="middle" font-size="10" font-weight="500" fill="#334155">角色</text>
  <text x="645" y="271" text-anchor="middle" font-size="10" fill="#475569">职能技能 · 最佳实践</text>
  <text x="830" y="271" text-anchor="middle" font-size="9" fill="#94a3b8">同角色可见</text>

  <text x="502" y="288" text-anchor="middle" font-size="10" font-weight="500" fill="#334155">个人</text>
  <text x="645" y="288" text-anchor="middle" font-size="10" fill="#475569">个人经验 · 成长记录</text>
  <text x="830" y="288" text-anchor="middle" font-size="9" fill="#94a3b8">默认私有</text>

  <!-- Arrow up -->
  <line x1="380" y1="318" x2="380" y2="299" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Arrow down: cloud → github (推送) -->
  <line x1="750" y1="299" x2="750" y2="341" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ===== 同步层 ===== -->
  <text x="55" y="335" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">同步层</text>
  <line x1="88" y1="331" x2="905" y2="331" stroke="#e2e8f0"/>

  <rect x="250" y="347" width="460" height="40" rx="8" fill="#475569"/>
  <text x="480" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="white">Git / GitHub</text>

  <!-- Arrow up -->
  <line x1="380" y1="410" x2="380" y2="393" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Arrow down: github → file system (同步) -->
  <line x1="765" y1="387" x2="765" y2="434" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ===== 本地层 ===== -->
  <text x="55" y="427" font-size="10" font-weight="600" fill="#3b82f6" letter-spacing="1.5">本地层</text>
  <line x1="88" y1="423" x2="905" y2="423" stroke="#e2e8f0"/>

  <rect x="55" y="440" width="250" height="48" rx="8" fill="#1e40af"/>
  <text x="180" y="469" text-anchor="middle" font-size="15" font-weight="700" fill="white">Obsidian</text>

  <text x="322" y="470" text-anchor="middle" font-size="16" font-weight="600" fill="#94a3b8">+</text>

  <rect x="340" y="440" width="250" height="48" rx="8" fill="#1e40af"/>
  <text x="465" y="469" text-anchor="middle" font-size="15" font-weight="700" fill="white">Local Agent</text>

  <text x="607" y="470" text-anchor="middle" font-size="16" font-weight="600" fill="#94a3b8">+</text>

  <rect x="625" y="440" width="280" height="48" rx="8" fill="#1e40af"/>
  <text x="765" y="469" text-anchor="middle" font-size="15" font-weight="700" fill="white">File System</text>

  <!-- Arrow up -->
  <line x1="480" y1="512" x2="480" y2="494" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ===== 数据源 ===== -->
  <text x="55" y="529" font-size="10" font-weight="600" fill="#14b8a6" letter-spacing="1.5">数据源</text>
  <line x1="88" y1="525" x2="905" y2="525" stroke="#e2e8f0"/>

  <rect x="55" y="540" width="125" height="32" rx="6" fill="#115e59"/>
  <text x="117" y="560" text-anchor="middle" font-size="11" font-weight="500" fill="white">博客 / 随笔</text>

  <rect x="195" y="540" width="120" height="32" rx="6" fill="#115e59"/>
  <text x="255" y="560" text-anchor="middle" font-size="11" font-weight="500" fill="white">聊天记录</text>

  <rect x="330" y="540" width="120" height="32" rx="6" fill="#115e59"/>
  <text x="390" y="560" text-anchor="middle" font-size="11" font-weight="500" fill="white">代码 / 文档</text>

  <rect x="465" y="540" width="120" height="32" rx="6" fill="#115e59"/>
  <text x="525" y="560" text-anchor="middle" font-size="11" font-weight="500" fill="white">照片 / 视频</text>

  <rect x="600" y="540" width="120" height="32" rx="6" fill="#115e59"/>
  <text x="660" y="560" text-anchor="middle" font-size="11" font-weight="500" fill="white">社交网络</text>

  <rect x="735" y="540" width="170" height="32" rx="6" fill="#115e59"/>
  <text x="820" y="560" text-anchor="middle" font-size="11" font-weight="500" fill="white">浏览记录</text>

  <!-- Quote -->
  <text x="480" y="597" text-anchor="middle" font-size="9" fill="#cbd5e1" font-style="italic">"个人思想（知识）的数据化，让我们能解锁的能力绝对是爆炸性的"</text>
</svg>
